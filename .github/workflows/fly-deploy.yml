name: Deploy App
on:
    workflow_dispatch:
    # Uncomment to deploy on push to main.
    # push:
    #     branches: [main]

# env:
#     FLY_ACCESS_MODE: flycast

jobs:
    set-secrets:
        uses: ./.github/workflows/fly-set-secrets.yml
        with:
            stage: true
        secrets: inherit

    deploy:
        needs: set-secrets
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/fly-setup
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}
            # Optional: enforce private-only access before deploy.
            # - uses: ./.github/actions/fly-private-network
            # Optional: validate/render Docker Compose when fly.json uses build.compose.
            # - uses: ./.github/actions/fly-compose
            - id: build-image
              uses: ./.github/actions/fly-build-image
            - uses: ./.github/actions/fly-deploy
              with:
                  enable-ha-with-no-volumes: "false"
                  image: ${{ steps.build-image.outputs.image }}
            # Optional: print a WireGuard config for private app access.
            # - uses: ./.github/actions/fly-wireguard-config
            # Optional: enforce process group Machine counts, for example after disabling deploy HA.
            # - uses: ./.github/actions/fly-scale-processes
            #   with:
            #       counts: web=1
            # Optional: for apps using fly.json experimental.machine_config.
            # - uses: ./.github/actions/fly-cleanup-machines
            #   with:
            #       confirm: "true"
            # Optional: delete unattached volumes. Set orphaned to "true" to also
            # snapshot and remove attached volumes no longer declared in fly.json mounts.
            # - uses: ./.github/actions/fly-cleanup-volumes
            #   with:
            #       confirm: "true"
            #       orphaned: "false"
