name: Common Fly.io Workflow

on:
    workflow_call:
        inputs:
            bootstrap:
                type: boolean
                default: false
            image:
                description: Image reference to deploy; reads fly.json .build.image when omitted
                type: string

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/fly-setup
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}

            - name: Check app exists
              if: ${{ !inputs.bootstrap }}
              run: |
                  APP_EXISTS=$(flyctl apps list --json | jq -r --arg name "$FLY_APP_NAME" '.[] | select(.Name == $name) | .Name')
                  if [ -z "$APP_EXISTS" ]; then
                    echo "App '$FLY_APP_NAME' not found. Run the bootstrap workflow first."
                    exit 1
                  fi

            - name: Provision Resources
              if: inputs.bootstrap
              run: |
                  MOUNTS=$(jq -c '.mounts // []' fly.json)
                  APP_EXISTS=$(flyctl apps list --json | jq -r --arg name "$FLY_APP_NAME" '.[] | select(.Name == $name) | .Name')
                  [ -z "$APP_EXISTS" ] && flyctl apps create "$FLY_APP_NAME" --org "$FLY_ORG" --verbose
                  echo "$MOUNTS" | jq -r '.[] | .source' | while read vol; do
                    VOL_EXISTS=$(flyctl volumes list --app "$FLY_APP_NAME" --json | jq -r --arg v "$vol" '.[] | select(.name == $v) | .id')
                    [ -z "$VOL_EXISTS" ] && flyctl volumes create "$vol" --region "$FLY_PRIMARY_REGION" --app "$FLY_APP_NAME" --yes --verbose
                  done

            - name: Migrate region if changed
              if: ${{ !inputs.bootstrap }}
              run: |
                  MOUNTS=$(jq -c '.mounts // []' fly.json)
                  migrate_machine() {
                    local old_id=$1 mounts=$2
                    local volumes=$(flyctl volumes list --app "$FLY_APP_NAME" --json | jq -c --arg m "$old_id" --arg r "$FLY_PRIMARY_REGION" '[.[] | select(.attached_machine_id == $m and .region != $r)]')

                    if [ "$(echo "$volumes" | jq 'length')" -gt 0 ]; then
                      echo "$volumes" | jq -c '.[]' | while read vol; do
                        local vol_id=$(echo "$vol" | jq -r .id)
                        local new_id=$(flyctl volumes fork "$vol_id" --region "$FLY_PRIMARY_REGION" --app "$FLY_APP_NAME" --json | jq -r .id)
                        until [ "$(flyctl volumes list --app "$FLY_APP_NAME" --json | jq -r --arg id "$new_id" '.[] | select(.id == $id) | .state')" = "created" ]; do sleep 10; done
                        local vol_name=$(echo "$vol" | jq -r .name)
                        local mount=$(echo "$mounts" | jq -r --arg s "$vol_name" '.[] | select(.source == $s) | .destination')
                        echo "--attach-volume $new_id:$mount"
                      done | xargs flyctl machine clone "$old_id" --region "$FLY_PRIMARY_REGION" --app "$FLY_APP_NAME" --verbose
                    else
                      flyctl machine clone "$old_id" --region "$FLY_PRIMARY_REGION" --app "$FLY_APP_NAME" --verbose
                    fi

                    flyctl machine stop "$old_id" --app "$FLY_APP_NAME" --verbose
                  }

                  flyctl machine list --app "$FLY_APP_NAME" --json | jq -r --arg r "$FLY_PRIMARY_REGION" '.[] | select(.region != $r) | .id' | \
                    while read id; do migrate_machine "$id" "$MOUNTS"; done

            - name: Backup and remove orphaned volumes
              if: ${{ !inputs.bootstrap }}
              run: |
                  MOUNTS=$(jq -c '.mounts // []' fly.json)
                  configured=$(echo "$MOUNTS" | jq -r '.[].source')
                  flyctl volumes list --app "$FLY_APP_NAME" --json | jq -r '.[] | select(.attached_machine_id) | "\(.id)|\(.name)|\(.attached_machine_id)"' | while IFS='|' read vol_id vol_name machine_id; do
                    echo "$configured" | grep -qx "$vol_name" && continue

                    flyctl volumes snapshots create "$vol_id" --app "$FLY_APP_NAME" --verbose
                    flyctl machine destroy "$machine_id" --app "$FLY_APP_NAME" --force --verbose
                    flyctl volumes destroy "$vol_id" --app "$FLY_APP_NAME" --yes --verbose
                  done

            - name: Deploy
              run: |
                  OVERRIDE_IMAGE="${{ inputs.image }}"
                  BUILD_IMAGE=$(jq -r '.build.image // empty' fly.json)
                  if [ -n "$OVERRIDE_IMAGE" ]; then
                    flyctl deploy --app "$FLY_APP_NAME" --config fly.json --image "$OVERRIDE_IMAGE" --yes --debug --verbose
                  elif [ -n "$BUILD_IMAGE" ]; then
                    docker pull "$BUILD_IMAGE"
                    flyctl deploy --app "$FLY_APP_NAME" --config fly.json --image "$BUILD_IMAGE" --local-only --yes --debug --verbose
                  else
                    flyctl deploy --app "$FLY_APP_NAME" --config fly.json --yes --debug --verbose
                  fi

            - name: Reconcile machine instances for .experimental.machine_config
              if: ${{ !inputs.bootstrap }}
              run: |
                  machine_config=$(jq -r '.experimental.machine_config // empty' fly.json)
                  [ -z "$machine_config" ] && exit 0

                  # Keep the oldest active machine; destroy all others (replaced versions + duplicates)
                  KEEP=$(flyctl machine list --app "$FLY_APP_NAME" --json | \
                    jq -r '[.[] | select(.state != "replaced")] | sort_by(.created_at) | first | .id // empty')
                  [ -z "$KEEP" ] && exit 0

                  flyctl machine list --app "$FLY_APP_NAME" --json | \
                    jq -r --arg k "$KEEP" '.[] | select(.id != $k) | .id' | \
                    xargs -r flyctl machine destroy --app "$FLY_APP_NAME" --force --verbose
