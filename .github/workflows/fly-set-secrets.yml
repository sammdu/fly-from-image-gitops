name: Set Fly Secrets

on:
    workflow_call:
        inputs:
            stage:
                description: Stage secrets without restarting machines
                type: boolean
                default: true

jobs:
    set-secrets:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/fly-setup
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}
            - uses: ./.github/actions/fly-sync-secrets
              with:
                  stage: ${{ inputs.stage }}
                  secrets: ""
