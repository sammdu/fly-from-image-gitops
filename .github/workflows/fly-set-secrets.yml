name: Set Fly Secrets

on:
    workflow_call:
        inputs:
            stageBeforeDeploy:
                description: Stage secrets without restarting machines (true for regular deploys, false for bootstrap)
                type: boolean
                default: false

jobs:
    set-secrets:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/fly-setup
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}
            - name: Set app secrets
              run: |
                  STAGE_FLAG=""
                  [ "${{ inputs.stageBeforeDeploy }}" = "true" ] && STAGE_FLAG="--stage"
                  # Uncomment and customize with your secrets.
                  # Unset-all ensures the listed secrets are the complete desired state:
                  # CURRENT=$(flyctl secrets list --app "$FLY_APP_NAME" --json | jq -r '.[].Name' | xargs)
                  # [ -n "$CURRENT" ] && flyctl secrets unset --app "$FLY_APP_NAME" $STAGE_FLAG $CURRENT
                  # flyctl secrets set --app "$FLY_APP_NAME" $STAGE_FLAG \
                  #     SECRET_NAME='${{ secrets.SECRET_NAME }}'
                  echo "No secrets configured. Edit this workflow to add secrets."
