name: Fly Bootstrap

on:
    workflow_dispatch:
    workflow_call:

jobs:
    bootstrap:
        uses: ./.github/workflows/fly.common.yml
        with:
            bootstrap: true
        secrets: inherit

    set-secrets:
        needs: bootstrap
        uses: ./.github/workflows/fly-set-secrets.yml
        with:
            stageBeforeDeploy: false
        secrets: inherit
