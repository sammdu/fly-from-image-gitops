name: Fly Bootstrap

on:
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    FLY_ORG: personal

jobs:
    bootstrap:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/fly-setup
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}
            - uses: ./.github/actions/fly-provision
            - uses: ./.github/actions/fly-sync-secrets
              with:
                  stage: "false"
            - id: build-image
              uses: ./.github/actions/fly-build-image
            - uses: ./.github/actions/fly-deploy
              with:
                  image: ${{ steps.build-image.outputs.image }}
