name: Fly.io Setup
description: Setup flyctl and load environment configuration

inputs:
    fly-api-token:
        description: Fly.io API token
        required: true

runs:
    using: composite
    steps:
        - uses: superfly/flyctl-actions/setup-flyctl@master
        - name: Load environment
          shell: bash
          run: |
              FLY_API_TOKEN="${{ inputs.fly-api-token }}"
              FLY_APP_NAME=$(jq -r '.app // ""' fly.json)
              FLY_PRIMARY_REGION=$(jq -r '.primary_region // ""' fly.json)

              if [ -z "$FLY_ORG" ]; then
                  FLY_ORG="personal"
              fi

              if [ -z "$FLY_API_TOKEN" ]; then
                  echo "Missing fly-api-token"
                  exit 1
              fi

              if [ -z "$FLY_APP_NAME" ]; then
                  echo "Missing .app in fly.json"
                  exit 1
              fi

              if [ -z "$FLY_PRIMARY_REGION" ]; then
                  echo "Missing .primary_region in fly.json"
                  exit 1
              fi

              cat >> "$GITHUB_ENV" <<EOF
              FLY_API_TOKEN=$FLY_API_TOKEN
              FLY_APP_NAME=$FLY_APP_NAME
              FLY_PRIMARY_REGION=$FLY_PRIMARY_REGION
              FLY_ORG=$FLY_ORG
              EOF
