name: Fly.io Cleanup Machines
description: Remove duplicate/replaced machines when fly.json uses experimental.machine_config

inputs:
    confirm:
        description: Set to "true" to destroy duplicate/replaced machines
        required: false
        default: "false"

runs:
    using: composite
    steps:
        - name: Cleanup machines
          shell: bash
          env:
              CONFIRM: ${{ inputs.confirm }}
          run: |
              machine_config=$(jq -r '.experimental.machine_config // empty' fly.json)
              if [ -z "$machine_config" ]; then
                  echo "No experimental.machine_config configured."
                  exit 0
              fi

              keep=$(flyctl machine list --app "$FLY_APP_NAME" --json | jq -r '[.[] | select(.state != "replaced")] | sort_by(.created_at) | first | .id // empty')
              if [ -z "$keep" ]; then
                  echo "No active machine found to keep."
                  exit 0
              fi

              remove=$(flyctl machine list --app "$FLY_APP_NAME" --json | jq -r --arg keep "$keep" '.[] | select(.id != $keep) | .id')
              if [ -z "$remove" ]; then
                  echo "No duplicate/replaced machines found."
                  exit 0
              fi

              echo "Keeping machine: $keep"
              echo "Machines to remove:"
              echo "$remove"

              if [ "$CONFIRM" != "true" ]; then
                  echo "Machine cleanup is disabled. Set confirm: \"true\" to destroy listed machines."
                  exit 0
              fi

              echo "$remove" | while read -r machine_id; do
                  [ -z "$machine_id" ] && continue
                  flyctl machine destroy "$machine_id" --app "$FLY_APP_NAME" --force --verbose
              done
