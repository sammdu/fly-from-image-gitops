name: Fly.io Deploy
description: Deploy a Fly.io app from a built image, configured image, or local app config

inputs:
    image:
        description: Image reference to deploy
        required: false
        default: ""
    enable-ha-with-no-volumes:
        description: Set to "true" to let fly deploy create HA spare Machines for service groups without volumes
        required: false
        default: "false"

runs:
    using: composite
    steps:
        - name: Deploy app
          shell: bash
          run: |
              app_exists=$(flyctl apps list --json | jq -r --arg name "$FLY_APP_NAME" '.[] | select(.Name == $name) | .Name')
              if [ -z "$app_exists" ]; then
                  echo "App '$FLY_APP_NAME' not found. Run the Fly Bootstrap workflow first."
                  exit 1
              fi

              override_image="${{ inputs.image }}"
              configured_image=$(jq -r '.build.image // empty' fly.json)
              deploy_args=(--app "$FLY_APP_NAME" --config fly.json --ha="${{ inputs.enable-ha-with-no-volumes }}" --yes --debug --verbose)

              if [ -n "$override_image" ]; then
                  flyctl deploy "${deploy_args[@]}" --image "$override_image"
              elif [ -n "$configured_image" ]; then
                  docker pull "$configured_image"
                  flyctl deploy "${deploy_args[@]}" --image "$configured_image" --local-only
              else
                  flyctl deploy "${deploy_args[@]}"
              fi
        - uses: ./.github/actions/fly-access-url
