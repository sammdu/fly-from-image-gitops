name: Fly.io WireGuard Config
description: Create or recreate a Fly WireGuard peer and print the config

inputs:
    peer-name:
        description: WireGuard peer name; blank uses app name prefix plus short commit
        required: false
        default: ""
    match-prefix:
        description: Peer name prefix to match for existence and recreate cleanup; blank uses generated app prefix when peer-name is blank
        required: false
        default: ""
    recreate:
        description: Remove and recreate the peer before creating it
        required: false
        default: "false"

runs:
    using: composite
    steps:
        - name: Print WireGuard config
          shell: bash
          env:
              WIREGUARD_PEER_NAME: ${{ inputs.peer-name }}
              WIREGUARD_MATCH_PREFIX: ${{ inputs.match-prefix }}
              RECREATE_WIREGUARD: ${{ inputs.recreate }}
          run: |
              app_prefix=$(printf '%s' "$FLY_APP_NAME" | cut -c1-10)
              short_sha=$(printf '%s' "$GITHUB_SHA" | cut -c1-4)
              peer="$WIREGUARD_PEER_NAME"
              [ -n "$peer" ] || peer="$app_prefix-$short_sha"

              match_prefix="$WIREGUARD_MATCH_PREFIX"
              [ -z "$match_prefix" ] && [ -z "$WIREGUARD_PEER_NAME" ] && match_prefix="$app_prefix-"
              match_label="$peer"
              [ -n "$match_prefix" ] && match_label="$match_prefix"

              config_file="$RUNNER_TEMP/$peer.conf"
              recreate="$RECREATE_WIREGUARD"
              [ -n "$recreate" ] || recreate="false"

              peers=$(flyctl wireguard list "$FLY_ORG" --json | tee /dev/stderr)

              if [ -n "$match_prefix" ]; then
                  matching_peers=$(printf '%s\n' "$peers" | jq -r --arg prefix "$match_prefix" '.[] | (.Name // .name // "") | select(startswith($prefix))')
              else
                  matching_peers=$(printf '%s\n' "$peers" | jq -r --arg peer "$peer" '.[] | (.Name // .name // "") | select(. == $peer)')
              fi

              if [ "$recreate" = "true" ] && [ -n "$matching_peers" ]; then
                  while IFS= read -r matching_peer; do
                      [ -n "$matching_peer" ] || continue
                      flyctl wireguard remove "$FLY_ORG" "$matching_peer"
                  done <<< "$matching_peers"
                  matching_peers=""
              fi

              if [ -n "$matching_peers" ]; then
                  echo "::notice::WireGuard peer matching '$match_label' already exists. Existing private keys cannot be recovered; run the WireGuard workflow with recreate=true to print a fresh config."
                  exit 0
              fi

              flyctl wireguard create "$FLY_ORG" "$FLY_PRIMARY_REGION" "$peer" "$config_file"

              echo "::notice::Recommended filename: $peer.conf"
              echo "::notice::Import this config into a WireGuard client."
              echo "Recommended filename: $peer.conf"
              echo "-----BEGIN $peer.conf-----"
              cat "$config_file"
              echo "-----END $peer.conf-----"
