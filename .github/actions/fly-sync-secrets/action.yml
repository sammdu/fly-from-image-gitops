name: Fly.io Sync Secrets
description: Import Fly.io secrets from KEY=VALUE lines

inputs:
    stage:
        description: Stage secrets without restarting machines
        required: false
        default: "true"
    secrets:
        description: Newline-separated KEY=VALUE secrets to import
        required: false
        default: ""

runs:
    using: composite
    steps:
        - name: Sync secrets
          shell: bash
          env:
              FLY_SECRETS: ${{ inputs.secrets }}
              STAGE_SECRETS: ${{ inputs.stage }}
          run: |
              if [ -z "$FLY_SECRETS" ]; then
                  echo "No secrets configured."
                  exit 0
              fi

              if printf '%s\n' "$FLY_SECRETS" | grep -v '^$' | grep -qvE '^[A-Za-z_][A-Za-z0-9_]*=.+'; then
                  echo "Invalid secrets: each line must be non-empty KEY=VALUE."
                  exit 1
              fi

              if [ "$STAGE_SECRETS" = "true" ]; then
                  printf '%s\n' "$FLY_SECRETS" | flyctl secrets import --app "$FLY_APP_NAME" --stage
              else
                  printf '%s\n' "$FLY_SECRETS" | flyctl secrets import --app "$FLY_APP_NAME"
              fi
