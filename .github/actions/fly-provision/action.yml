name: Fly.io Provision
description: Create the Fly.io app and any volumes declared in fly.json

runs:
    using: composite
    steps:
        - name: Provision app and volumes
          shell: bash
          run: |
              app_exists=$(flyctl apps list --json | jq -r --arg name "$FLY_APP_NAME" '.[] | select(.Name == $name) | .Name')
              if [ -z "$app_exists" ]; then
                  flyctl apps create "$FLY_APP_NAME" --org "$FLY_ORG" --verbose
              fi

              jq -c '.mounts // [] | .[]' fly.json | while read -r mount; do
                  volume=$(echo "$mount" | jq -r '.source // ""')
                  if [ -z "$volume" ]; then
                      echo "Mount is missing source"
                      exit 1
                  fi

                  volume_exists=$(flyctl volumes list --app "$FLY_APP_NAME" --json | jq -r --arg name "$volume" '.[] | select(.name == $name) | .id')

                  if [ -n "$volume_exists" ]; then
                      echo "Volume '$volume' already exists."
                      continue
                  fi

                  volume_args=("$volume" --region "$FLY_PRIMARY_REGION" --app "$FLY_APP_NAME" --yes --verbose)

                  initial_size=$(printf '%s\n' "$mount" | jq -r '.initial_size // "" | tostring | ascii_downcase | rtrimstr("gb")')
                  [ -n "$initial_size" ] && volume_args+=(--size "$initial_size")

                  snapshot_retention=$(echo "$mount" | jq -r '.snapshot_retention // empty')
                  [ -n "$snapshot_retention" ] && volume_args+=(--snapshot-retention "$snapshot_retention")

                  scheduled_snapshots=$(echo "$mount" | jq -r '.scheduled_snapshots // empty')
                  [ "$scheduled_snapshots" = "false" ] && volume_args+=(--scheduled-snapshots=false)

                  flyctl volumes create "${volume_args[@]}"
              done
