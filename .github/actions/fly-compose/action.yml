name: Fly.io Compose
description: Validate and optionally render Docker Compose before flyctl deploy

inputs:
    file:
        description: Compose file path; blank reads fly.json build.compose.file
        required: false
        default: ""
    render:
        description: Render resolved Compose back to the selected file
        required: false
        default: "true"
    env-file:
        description: Compose interpolation env file
        required: false
        default: ""

outputs:
    file:
        description: Compose file path processed by this action
        value: ${{ steps.compose.outputs.file }}

runs:
    using: composite
    steps:
        - id: compose
          shell: bash
          env:
              COMPOSE_FILE_INPUT: ${{ inputs.file }}
              COMPOSE_ENV_FILE: ${{ inputs.env-file }}
              RENDER_COMPOSE: ${{ inputs.render }}
          run: |
              file="$COMPOSE_FILE_INPUT"
              [ -n "$file" ] || file=$(jq -r '.build.compose.file // empty' fly.json)

              if [ -z "$file" ]; then
                  echo "No build.compose.file configured."
                  exit 0
              fi

              compose_args=(-f "$file")
              [ -n "$COMPOSE_ENV_FILE" ] && compose_args=(--env-file "$COMPOSE_ENV_FILE" "${compose_args[@]}")

              docker compose version
              docker compose "${compose_args[@]}" config --no-normalize --quiet
              docker compose "${compose_args[@]}" config --services

              if [ "$RENDER_COMPOSE" = "true" ]; then
                  docker compose "${compose_args[@]}" config --no-normalize > "$RUNNER_TEMP/compose.yaml"
                  mv "$RUNNER_TEMP/compose.yaml" "$file"
              fi

              echo "file=$file" >> "$GITHUB_OUTPUT"
